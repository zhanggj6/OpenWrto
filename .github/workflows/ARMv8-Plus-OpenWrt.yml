name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      CONFIG_FILE:
        description: '配置文件路径'
        required: true
        default: 'configs/armv8-plus.config'
      REPO_URL:
        description: '源码仓库地址'
        required: true
        default: 'https://github.com/coolsnowwolf/lede'
      REPO_BRANCH:
        description: '源码分支'
        required: true
        default: 'master'

env:
  TZ: Asia/Shanghai
  OPENWRT_PATH: openwrt

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev libssl-dev libelf-dev python3 python3-pip \
            git wget curl unzip bzip2 file rsync

      - name: 克隆 OpenWrt 源码
        run: |
          git clone --depth 1 -b ${{ github.event.inputs.REPO_BRANCH }} ${{ github.event.inputs.REPO_URL }} ${{ env.OPENWRT_PATH }}

      - name: 生成变量 & 准备配置
        id: variables
        run: |
          set -e
          # 复制配置文件到源码目录
          cp ${{ github.event.inputs.CONFIG_FILE }} ${{ env.OPENWRT_PATH }}/.config
          cd ${{ env.OPENWRT_PATH }}

          # 更新并安装 feeds（关键修复，避免依赖缺失）
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 修复配置兼容性问题
          make olddefconfig

          # 执行 defconfig，保留日志方便排错
          make defconfig

          # 提取设备目标变量
          DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F= '{print $2}' | tr -d '"')
          DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F= '{print $2}' | tr -d '"')
          SOURCE_REPO=$(echo ${{ github.event.inputs.REPO_URL }} | awk -F/ '{print $NF}')

          # 写入 GitHub 环境变量
          echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
          echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
          echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_OUTPUT
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_OUTPUT

      - name: 编译固件
        run: |
          cd ${{ env.OPENWRT_PATH }}
          make -j$(nproc)

      - name: 上传固件文件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
          path: ${{ env.OPENWRT_PATH }}/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}
